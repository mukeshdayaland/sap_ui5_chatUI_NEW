_schema-version: "3.3"
ID: sap_ui5_chatui_new
version: 1.0.0
description: SAPUI5 CAP MCP SuccessFactors Chat Assistant

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install --omit=dev --no-audit --no-fund
        - npx --yes @sap/cds-dk cds build --production

modules:
  - name: sap-ui5-chat-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: sap-ui5-chat-xsuaa
      - name: sap-ui5-chat-destination
      - name: sap-ui5-chat-db
    properties:
      LLM_API_URL: https://api.openai.com/v1/chat/completions
      LLM_MODEL: gpt-4o-mini
      LLM_API_KEY: ((llm-api-key))
      MCP_DESTINATION_NAME: MCP_MIDDLEWARE

  - name: sap-ui5-chat-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
    requires:
      - name: sap-ui5-chat-db

  - name: sap-ui5-chat-mcp
    type: nodejs
    path: mcp
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
    provides:
      - name: mcp-api
        properties:
          mcp-url: ${default-url}
    requires:
      - name: sap-ui5-chat-xsuaa
      - name: sap-ui5-chat-destination
    properties:
      SF_DESTINATION_NAME: SF_API
      MCP_CLIENT_ID: ((mcp-client-id))
      MCP_CLIENT_SECRET: ((mcp-client-secret))
      SF_API_BASE_URL: ((sf-api-base-url))
      SF_TOKEN_URL: ((sf-token-url))
      SF_CLIENT_ID: ((sf-client-id))
      SF_CLIENT_SECRET: ((sf-client-secret))

  - name: sap-ui5-chat-router
    type: approuter.nodejs
    path: app/router
    parameters:
      memory: 128M
      keep-existing-routes: true
    requires:
      - name: sap-ui5-chat-xsuaa
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
      - name: sap-ui5-chat-html5-runtime

  - name: sap-ui5-chat-ui-deployer
    type: com.sap.application.content
    path: .
    requires:
      - name: sap-ui5-chat-html5-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - name: sap-ui5-chat-ui
          artifacts:
            - sap-ui5-chat-ui.zip
          target-path: resources/

  - name: sap-ui5-chat-ui
    type: html5
    path: app/chat-ui
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build
      supported-platforms: []

  - name: sap-ui5-chat-destination-content
    type: com.sap.application.content
    requires:
      - name: sap-ui5-chat-destination
        parameters:
          content-target: true
      - name: mcp-api
    parameters:
      content:
        instance:
          destinations:
            - Name: MCP_MIDDLEWARE
              URL: ~{mcp-api/mcp-url}
              Type: HTTP
              ProxyType: Internet
              Authentication: OAuth2ClientCredentials
              tokenServiceURL: ~{mcp-api/mcp-url}/auth/token
              clientId: ((mcp-client-id))
              clientSecret: ((mcp-client-secret))
          existing_destinations_policy: update
    build-parameters:
      no-source: true

resources:
  - name: sap-ui5-chat-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json

  - name: sap-ui5-chat-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true

  - name: sap-ui5-chat-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: sap-ui5-chat-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: sap-ui5-chat-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
